<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EventFlow AI</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-mesh);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .auth-bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: radial-gradient(rgba(124, 58, 237, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
        }

        .auth-card {
            background: var(--white);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-2xl);
            padding: 3rem;
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            text-decoration: none;
        }

        .auth-logo-icon {
            width: 50px;
            height: 50px;
            background: var(--gradient-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .auth-logo-text {
            font-size: 1.75rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--gray-900);
        }

        .auth-subtitle {
            color: var(--gray-600);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        .form-label .optional {
            color: var(--gray-500);
            font-weight: 400;
            font-size: 0.75rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-lg);
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-input.error {
            border-color: var(--danger);
        }

        .error-message {
            display: none;
            color: var(--danger);
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }

        .success-message {
            display: none;
            color: var(--success);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            padding: 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: var(--radius-md);
            text-align: center;
        }

        .form-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            margin-top: 2px;
        }

        .form-checkbox label {
            font-size: 0.875rem;
            color: var(--gray-600);
            cursor: pointer;
            line-height: 1.5;
        }

        .form-checkbox label a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .form-checkbox label a:hover {
            color: var(--primary-dark);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--gray-300);
        }

        .divider span {
            padding: 0 1rem;
            color: var(--gray-600);
            font-size: 0.875rem;
        }

        .btn-linkedin {
            width: 100%;
            padding: 1rem;
            background: #0077b5;
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-linkedin:hover {
            background: #006399;
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .btn-linkedin i {
            font-size: 1.25rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--gray-200);
        }

        .auth-footer p {
            color: var(--gray-600);
            font-size: 0.875rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            color: var(--primary-dark);
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.75rem;
        }

        .strength-bar {
            height: 4px;
            background: var(--gray-300);
            border-radius: var(--radius-full);
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: var(--transition);
            border-radius: var(--radius-full);
        }

        .strength-weak { background: var(--danger); width: 33%; }
        .strength-medium { background: var(--warning); width: 66%; }
        .strength-strong { background: var(--success); width: 100%; }

        @media (max-width: 768px) {
            .auth-card {
                padding: 2rem;
            }

            .auth-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg-pattern"></div>
        
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <div class="auth-logo-icon">F</div>
                    <span class="auth-logo-text">EventFlow AI</span>
                </a>
                <h1 class="auth-title">Create Your Account</h1>
                <p class="auth-subtitle">Start your 14-day free trial today</p>
            </div>

            <div id="successMessage" class="success-message"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label for="name" class="form-label">Full Name</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        class="form-input" 
                        placeholder="John Doe"
                        required
                    >
                    <div id="nameError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="you@example.com"
                        required
                    >
                    <div id="emailError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="At least 6 characters"
                        required
                    >
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill"></div>
                    </div>
                    <div id="passwordStrength" class="password-strength"></div>
                    <div id="passwordError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="linkedinProfile" class="form-label">
                        LinkedIn Profile URL <span class="optional">(Optional)</span>
                    </label>
                    <input 
                        type="url" 
                        id="linkedinProfile" 
                        name="linkedinProfile" 
                        class="form-input" 
                        placeholder="https://linkedin.com/in/yourprofile"
                    >
                    <div id="linkedinError" class="error-message"></div>
                </div>

                <div class="form-group">
                    <label for="company" class="form-label">
                        Company Name <span class="optional">(Optional)</span>
                    </label>
                    <input 
                        type="text" 
                        id="company" 
                        name="company" 
                        class="form-input" 
                        placeholder="Your Company"
                    >
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <div id="formError" class="error-message" style="margin-bottom: 1rem; text-align: center;"></div>

                <button type="submit" id="signupBtn" class="btn btn-primary btn-auth">
                    <i class="fas fa-user-plus"></i>
                    Create Account
                </button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <button onclick="signupWithLinkedIn()" class="btn-linkedin">
                <i class="fab fa-linkedin"></i>
                Sign up with LinkedIn
            </button>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
                <p style="margin-top: 1rem;">
                    <a href="index.html">← Back to home</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="assets/js/auth.js"></script>
    <script>
        // Password strength checker
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('passwordStrength');
            
            let strength = 0;
            let text = '';
            let className = '';
            
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            if (strength <= 2) {
                text = 'Weak password';
                className = 'strength-weak';
            } else if (strength <= 3) {
                text = 'Medium password';
                className = 'strength-medium';
            } else {
                text = 'Strong password';
                className = 'strength-strong';
            }
            
            strengthFill.className = 'strength-fill ' + className;
            strengthText.textContent = password.length > 0 ? text : '';
            strengthText.style.color = password.length > 0 ? 'var(--gray-600)' : '';
        });

        // Handle signup form submission
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            hideError('nameError');
            hideError('emailError');
            hideError('passwordError');
            hideError('linkedinError');
            hideError('formError');
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const linkedinProfile = document.getElementById('linkedinProfile').value.trim();
            const company = document.getElementById('company').value.trim();
            const terms = document.getElementById('terms').checked;
            
            // Validate
            let hasError = false;
            
            if (name.length < 2) {
                showError('nameError', 'Please enter your full name');
                hasError = true;
            }
            
            if (!validateEmail(email)) {
                showError('emailError', 'Please enter a valid email address');
                hasError = true;
            }
            
            if (!validatePassword(password)) {
                showError('passwordError', 'Password must be at least 6 characters');
                hasError = true;
            }
            
            if (linkedinProfile && !linkedinProfile.includes('linkedin.com')) {
                showError('linkedinError', 'Please enter a valid LinkedIn profile URL');
                hasError = true;
            }
            
            if (!terms) {
                showError('formError', 'Please accept the Terms of Service and Privacy Policy');
                hasError = true;
            }
            
            if (hasError) return;
            
            // Show loading
            setLoading('signupBtn', true);
            
            // Attempt signup
            const result = await auth.signup(name, email, password, linkedinProfile, company);
            
            // Hide loading
            setLoading('signupBtn', false);
            
            if (result.success) {
                showSuccess('successMessage', 'Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                showError('formError', result.message || 'Signup failed. Please try again.');
            }
        });

        // LinkedIn OAuth
        function signupWithLinkedIn() {
            auth.loginWithLinkedIn();
        }

        // If already logged in, redirect
        window.addEventListener('DOMContentLoaded', () => {
            if (auth.isAuthenticated()) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
